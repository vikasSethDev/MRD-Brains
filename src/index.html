  <!-- ═══ Loading screen styles ═══ -->
  <style>
    #app-loader {
      position: fixed; inset: 0; z-index: 99999;
      background: #080706;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      transition: opacity .6s ease, visibility .6s ease;
    }
    #app-loader.fade-out {
      opacity: 0; visibility: hidden;
    }
    .al-logo {
      width: 72px; height: 72px; border-radius: 18px;
      background: #fff;
      border: 2px solid rgba(201,151,74,.3);
      display: flex; align-items: center; justify-content: center;
      animation: al-pulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 8px rgba(201,151,74,.06);
    }
    .al-logo img { width: 58px; height: 58px; object-fit: contain; }
    .al-brand {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
      letter-spacing: -.01em;
    }
    .al-coral { color: #F0674A; }
    .al-ghost { color: #EDE9E1; }
    .al-sub {
      font-family: 'DM Mono', monospace; font-size: .6rem;
      color: rgba(201,151,74,.5); letter-spacing: .2em; text-transform: uppercase;
      margin-top: -18px;
    }
    .al-bar-wrap {
      width: 140px; height: 2px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden;
    }
    .al-bar {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #C9974A, #F0674A);
      animation: al-load 1.0s cubic-bezier(.4,0,.2,1) forwards;
    }
    .al-tagline {
      font-family: 'DM Mono', monospace; font-size: .58rem;
      color: rgba(237,233,225,.25); letter-spacing: .12em; text-transform: uppercase;
    }
    @keyframes al-pulse {
      0%,100% { box-shadow: 0 0 0 8px rgba(201,151,74,.06), 0 0 24px rgba(201,151,74,.12); }
      50%      { box-shadow: 0 0 0 14px rgba(201,151,74,.1), 0 0 40px rgba(201,151,74,.28); }
    }
    @keyframes al-load {
      0%   { width: 0%; }
      30%  { width: 40%; }
      60%  { width: 70%; }
      85%  { width: 90%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- ═══ Loading Screen ═══ -->
  <div id="app-loader">
    <div class="al-logo">
      <img src="assets/logo.png" alt="MrD Brains Technology">
    </div>
    <div class="al-brand">
      <span class="al-coral">Mr</span><span class="al-ghost">D Brains</span>
    </div>
    <div class="al-sub">Technology</div>
    <div class="al-bar-wrap">
      <div class="al-bar"></div>
    </div>
    <div class="al-tagline">Loading experience…</div>
  </div>

  <!-- ═══ Angular App ═══ -->
  <app-root></app-root>

  <!-- ═══ Remove loader after app boots ═══ -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function () { loader.remove(); }, 650);
        }
      }, 1800);
    });
  </script>
</body>
